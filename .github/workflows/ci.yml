name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @clip-tools/shared-types build
          pnpm --filter @clip-tools/shared-worker-runtime build
          pnpm --filter @clip-tools/worker build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Start worker for integration tests
        run: |
          pnpm --filter @clip-tools/worker start &
          sleep 3
          curl -sf http://localhost:8787/health

      - name: Integration tests
        run: pnpm test:integration
        env:
          WORKER_URL: http://localhost:8787

      - name: Build web
        run: pnpm --filter @clip-tools/web build
        env:
          WORKER_URL: http://localhost:8787

      - name: Validate docker compose
        run: |
          if command -v docker >/dev/null 2>&1; then
            docker compose config
          else
            echo "VERIFY-DEFERRED: docker not available on runner"
          fi
