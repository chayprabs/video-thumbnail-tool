services:
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    ports:
      - '8787:8787'
    environment:
      - NODE_ENV=production
      - PORT=8787
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8787/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - WORKER_URL=http://worker:8787
    depends_on:
      worker:
        condition: service_healthy
